---
# Wazuh indexer (OpenSearch) internal user DB — TEMPLATE ONLY.
#
# The bcrypt hashes are NOT committed. wazuh-secrets.service (see
# ../../../../modules/wazuh.nix) substitutes the @..._HASH@ placeholders below
# with bcrypt hashes of the per-deploy random passwords in
# /var/lib/mgmt-secrets/wazuh.env and writes the rendered file to
# /var/lib/mgmt-secrets/wazuh/internal_users.yml — which is what the container
# actually mounts. admin/kibanaserver use the env passwords; the rest get random
# throwaway passwords (unused demo accounts kept only for structural fidelity).

_meta:
  type: "internalusers"
  config_version: 2

admin:
  hash: "@ADMIN_HASH@"
  reserved: true
  backend_roles:
  - "admin"
  description: "Admin user"

kibanaserver:
  hash: "@KIBANASERVER_HASH@"
  reserved: true
  description: "Dashboard server user"

kibanaro:
  hash: "@KIBANARO_HASH@"
  reserved: false
  backend_roles:
  - "kibanauser"
  - "readall"
  attributes:
    attribute1: "value1"
    attribute2: "value2"
    attribute3: "value3"
  description: "Demo kibanaro user"

logstash:
  hash: "@LOGSTASH_HASH@"
  reserved: false
  backend_roles:
  - "logstash"
  description: "Demo logstash user"

readall:
  hash: "@READALL_HASH@"
  reserved: false
  backend_roles:
  - "readall"
  description: "Demo readall user"

snapshotrestore:
  hash: "@SNAPSHOTRESTORE_HASH@"
  reserved: false
  backend_roles:
  - "snapshotrestore"
  description: "Demo snapshotrestore user"
